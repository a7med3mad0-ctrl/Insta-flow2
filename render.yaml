services:
  - type: web
    name: instaflow
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        sync: false
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/app.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
